<section id="diagnostics" style="margin-top:40px;">
  <h2>Diagnostics</h2>

  <div style="margin-bottom:10px;">
    <label>Gravité :</label>
    <select id="diagSeverity">
      <option value="">Toutes</option>
      <option value="info">Info</option>
      <option value="warn">Warn</option>
      <option value="error">Error</option>
    </select>

    <button onclick="loadDiagnostics()">Recharger</button>
  </div>

  <div id="diagnosticsList"></div>
</section>

<script>
async function loadDiagnostics() {
  const severity = document.getElementById('diagSeverity').value;

  let url = '/superadmin/diagnostics';
  if (severity) url += '?severity=' + severity;

  const res = await fetch(url);
  const json = await res.json();

  const container = document.getElementById('diagnosticsList');

  if (!json.ok || !json.data.length) {
    container.innerHTML = '<p>Aucun incident</p>';
    return;
  }

  container.innerHTML = json.data.map(e => `
    <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
      <strong>${e.severity}</strong> — ${e.code || 'no_code'}
      <br/>
      Tenant: ${e.tenant_id || '-'}
      <br/>
      ${new Date(e.created_at).toLocaleString()}
    </div>
  `).join('');
}
</script>
